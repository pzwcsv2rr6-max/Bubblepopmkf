<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Pop Arcade Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a12;
        }
        
        /* Fond de jeu spatial/cyber */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #18182c 0%, #07070c 100%);
        }

        /* HUD Premium */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 10;
            text-transform: uppercase;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #coins-display {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }
        
        /* Bulles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear forwards;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            z-index: 5;
            transition: transform 0.1s ease;
        }
        .skin-classic {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 70%);
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 0 0 10px rgba(255,255,255,0.2);
        }
        .skin-neon {
            background: rgba(0, 255, 204, 0.05);
            border: 3px solid #00ffcc;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
        }
        .skin-star::after { content: "⭐"; filter: drop-shadow(0 0 5px #ffd700); }
        .skin-donut::after { content: "🍩"; }
        .skin-diamond::after { content: "💎"; filter: drop-shadow(0 0 8px #00bfff); }
        .skin-fire::after { content: "🔥"; filter: drop-shadow(0 0 8px #ff4500); }

        @keyframes floatUp {
            to { transform: translateY(-120vh); }
        }

        /* Écrans de Menu Cyberpunk */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Titres Lumineux */
        .glow-title {
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #00ffcc, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0,255,204,0.3));
            margin-bottom: 30px;
            text-align: center;
        }
        .red-title {
            background: linear-gradient(45deg, #ff3333, #ff007b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(255,51,51,0.3));
        }

        /* Boutons Modernes */
        .btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00ffcc, #00a8ff);
            color: #05050a;
            margin: 10px 0;
            cursor: pointer;
            width: 240px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3);
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(0, 255, 204, 0.2);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Grille Boutique Améliorée */
        .coins-bank {
            font-size: 20px;
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 20px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .skins-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            width: 88%;
            max-height: 48vh;
            overflow-y: auto;
            padding: 5px;
        }
        .skin-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .skin-option:active {
            transform: scale(0.95);
        }
        .skin-option.active {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.06);
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1), 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .preview {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }
        .skin-name {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e6;
        }
        .price-tag {
            font-size: 13px;
            color: #ffd700;
            font-weight: 700;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 12px;
            width: 100%;
        }
        .skin-option.active .price-tag {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="hud">
            <div id="score-display" class="hud-item">Score: 0</div>
            <div id="speed-display" class="hud-item">Vitesse: x1.0</div>
            <div id="coins-display" class="hud-item">💰 0</div>
            <div id="lives-display" class="hud-item">Vies: ❤️❤️❤️</div>
        </div>
        
        <div id="main-menu" class="screen">
            <h1 class="glow-title">Bubble Pop</h1>
            <button class="btn" id="start-btn">Jouer</button>
            <button class="btn btn-secondary" id="skins-btn">Boutique Skins</button>
        </div>

        <div id="game-over-menu" class="screen" style="display: none;">
            <h1 class="glow-title red-title">Game Over</h1>
            <div id="menu-score" style="margin-bottom: 8px; font-size: 19px; color: #ddd; font-weight: 500;"></div>
            <div id="menu-coins-earned" style="margin-bottom: 30px; font-size: 19px; color: #ffd700; font-weight: 600;"></div>
            
            <button class="btn" id="retry-btn">Rejouer</button>
            <button class="btn btn-secondary" id="home-btn" style="background: rgba(255,255,255,0.02);">Menu Principal</button>
        </div>

        <div id="skins-menu" class="screen" style="display: none;">
            <h1 class="glow-title" style="font-size: 32px; margin-bottom: 15px;">Boutique</h1>
            <div class="coins-bank">Mes Pièces: <span id="bank-count">0</span> 💰</div>
            <div class="skins-grid">
                <div class="skin-option active" data-skin="classic">
                    <div class="preview skin-classic"></div><span class="skin-name">Classique</span><span class="price-tag">Équipé</span>
                </div>
                <div class="skin-option" data-skin="neon">
                    <div class="preview skin-neon"></div><span class="skin-name">Néon</span><span class="price-tag">50 💰</span>
                </div>
                <div class="skin-option" data-skin="star">
                    <div class="preview skin-star"></div><span class="skin-name">Étoile</span><span class="price-tag">150 💰</span>
                </div>
                <div class="skin-option" data-skin="donut">
                    <div class="preview skin-donut"></div><span class="skin-name">Beignet</span><span class="price-tag">300 💰</span>
                </div>
                <div class="skin-option" data-skin="diamond">
                    <div class="preview skin-diamond"></div><span class="skin-name">Diamant</span><span class="price-tag">500 💰</span>
                </div>
                <div class="skin-option" data-skin="fire">
                    <div class="preview skin-fire"></div><span class="skin-name">Feu</span><span class="price-tag">1000 💰</span>
                </div>
            </div>
            <button class="btn btn-secondary" id="back-btn">Retour</button>
        </div>
    </div>

    <script>
        let score = 0;
        let coins = 0;
        
        let totalCoins = parseInt(localStorage.getItem('totalCoins')) || 0;
        let currentSkin = localStorage.getItem('currentSkin') || 'classic';
        let unlockedSkins = JSON.parse(localStorage.getItem('unlockedSkins')) || ['classic'];
        
        let lives = 3;
        let isPlaying = false;
        let gameTimeout = null;

        let baseSpawnDelay = 1200; 
        let baseSpeed = 4.5;       
        let speedMultiplier = 1.0; 

        const skinPrices = { neon: 50, star: 150, donut: 300, diamond: 500, fire: 1000 };

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('retry-btn').addEventListener('click', startGame);
        document.getElementById('skins-btn').addEventListener('click', openSkins);
        document.getElementById('back-btn').addEventListener('click', closeSkins);
        document.getElementById('home-btn').addEventListener('click', resetToMainMenu);

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-over-menu').style.display = 'none';
            
            score = 0;
            coins = 0;
            lives = 3;
            speedMultiplier = 1.0;
            isPlaying = true;
            
            document.querySelectorAll('.bubble').forEach(b => b.remove());
            if (gameTimeout) clearTimeout(gameTimeout);
            
            updateHUD();
            gameLoop();
        }

        function gameLoop() {
            if (!isPlaying) return;
            
            createBubble();
            
            let currentSpawnDelay = Math.max(350, baseSpawnDelay / Math.sqrt(speedMultiplier));
            gameTimeout = setTimeout(gameLoop, currentSpawnDelay);
        }

        function createBubble() {
            if (!isPlaying) return;

            const bubble = document.createElement('div');
            bubble.className = `bubble skin-${currentSkin}`;

            // Agrandissement léger de la taille minimale des bulles pour faciliter le ciblage
            const size = Math.floor(Math.random() * 25) + 65; 
            const posX = Math.random() * (window.innerWidth - size);
            
            let duration = Math.max(1.0, (baseSpeed / speedMultiplier) - (Math.random() * 0.3));

            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = posX + 'px';
            bubble.style.bottom = -size + 'px';
            bubble.style.animationDuration = duration + 's';

            // Utilisation de pointerdown pour une réactivité immédiate sur écran tactile
            bubble.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                if (!isPlaying) return;
                
                score += 10;
                coins += Math.max(1, Math.round(0.25 * speedMultiplier)); 
                speedMultiplier += 0.04; 

                updateHUD();
                bubble.remove();
            });

            bubble.addEventListener('animationend', () => {
                bubble.remove();
                loseLife(); // On ne perd une vie QUE si la bulle sort de l'écran
            });

            document.getElementById('game-container').appendChild(bubble);
        }

        function loseLife() {
            if (!isPlaying) return;
            lives--;
            updateHUD();
            if (lives <= 0) gameOver();
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = "Score: " + score;
            document.getElementById('speed-display').innerText = "Vitesse: x" + speedMultiplier.toFixed(1);
            document.getElementById('coins-display').innerText = "💰 " + coins;
            document.getElementById('lives-display').innerText = "Vies: " + "❤️".repeat(Math.max(0, lives));
        }

        function gameOver() {
            isPlaying = false;
            if (gameTimeout) clearTimeout(gameTimeout);
            document.querySelectorAll('.bubble').forEach(b => b.remove());

            totalCoins += coins;
            localStorage.setItem('totalCoins', totalCoins);

            document.getElementById('menu-score').innerText = "Score final : " + score;
            document.getElementById('menu-coins-earned').innerText = "Pièces récoltées : +" + coins + " 💰";
            
            document.getElementById('game-over-menu').style.display = 'flex';
        }

        function resetToMainMenu() {
            document.getElementById('game-over-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            score = 0;
            coins = 0;
            lives = 3;
            speedMultiplier = 1.0;
            updateHUD();
        }

        function openSkins() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('skins-menu').style.display = 'flex';
            document.getElementById('bank-count').innerText = totalCoins;
            updateSkinsUI();
        }

        function closeSkins() {
            document.getElementById('skins-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        document.querySelectorAll('.skin-option').forEach(option => {
            option.addEventListener('click', () => {
                let id = option.getAttribute('data-skin');
                
                if (unlockedSkins.includes(id)) {
                    currentSkin = id;
                    localStorage.setItem('currentSkin', currentSkin);
                } else {
                    let price = skinPrices[id];
                    if (totalCoins >= price) {
                        totalCoins -= price;
                        unlockedSkins.push(id);
                        currentSkin = id;
                        
                        localStorage.setItem('totalCoins', totalCoins);
                        localStorage.setItem('unlockedSkins', JSON.stringify(unlockedSkins));
                        localStorage.setItem('currentSkin', currentSkin);
                        
                        document.getElementById('bank-count').innerText = totalCoins;
                    } else {
                        alert("Pas assez de pièces !");
                    }
                }
                updateSkinsUI();
            });
        });

        function updateSkinsUI() {
            document.querySelectorAll('.skin-option').forEach(option => {
                let id = option.getAttribute('data-skin');
                let priceTag = option.querySelector('.price-tag');
                
                if (currentSkin === id) {
                    option.className = "skin-option active";
                    priceTag.innerText = "Équipé";
                } else if (unlockedSkins.includes(id)) {
                    option.className = "skin-option";
                    priceTag.innerText = "Débloqué";
                } else {
                    option.className = "skin-option";
                    priceTag.innerText = skinPrices[id] + " 💰";
                }
            });
        }

        updateSkinsUI();
    </script>
</body>
</html>
